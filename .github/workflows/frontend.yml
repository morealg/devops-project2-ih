name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'config/ansible/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'config/ansible/**'
      - '.github/workflows/frontend.yml'

jobs:

  build:
    name: Build React App
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run Tests
        working-directory: ./frontend
        run: npm test -- --run

      - name: Build for Production
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: ""
          NODE_ENV: production
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ secrets.VITE_APPINSIGHTS_CONNECTION_STRING }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1

  deploy:
    name: Deploy to Frontend VM
    runs-on: [self-hosted, linux, ops]
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_PRIVATE_DEPLOY == 'true'

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: ./dist

      - name: Deploy via Ansible
        working-directory: ./config/ansible
        run: |
          ansible-playbook playbooks/deploy-frontend.yml \
            -i inventories/dev/hosts.yml \
            --extra-vars "artifact_path=../../dist"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      - name: Verify Deployment
        run: |
          sleep 10
          curl -f http://${{ secrets.FRONTEND_VM_IP }}
          echo "Frontend is UP!"

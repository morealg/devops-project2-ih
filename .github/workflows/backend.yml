# ============================================================
# FILE: .github/workflows/backend.yml
# PURPOSE: Builds the Spring Boot backend JAR and deploys it.
#
# HOW IT WORKS (same Hybrid Runner Pattern as frontend):
#   JOB 1 "build"   → GitHub-hosted runner
#                      runs Maven, packages the JAR
#                      runs SonarQube scan (via self-hosted runner)
#
#   JOB 2 "deploy"  → self-hosted runner (your Ops VM)
#                      downloads JAR artifact
#                      uses Ansible to deploy to Backend VM
# ============================================================

name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: BUILD — runs on GitHub's free servers
  # ─────────────────────────────────────────────
  build:
    name: Build Spring Boot App
    runs-on: ubuntu-latest

    steps:

      # 1. Get the code
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # SonarQube needs full git history for blame analysis

      # 2. Install Java 17 (required for Spring Boot 3.x)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'   # Eclipse Temurin is the standard free JDK
          cache: 'maven'

      # 3. Run tests + package into a JAR file
      #    Output will be at: backend/target/*.jar
      - name: Build with Maven
        working-directory: ./backend
        run: mvn clean package -DskipTests=false
        # WHY: -DskipTests=false means run all unit tests before packaging
        env:
          # Use test profile so it doesn't try to connect to real Azure SQL
          SPRING_PROFILES_ACTIVE: test

      # 4. Save the JAR file for the deploy job
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          # Maven puts the JAR in target/ — the ! excludes the "original" JAR
          path: backend/target/*.jar
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: SONARQUBE SCAN — runs on self-hosted runner
  # WHY self-hosted: SonarQube is on your private Ops VM,
  # GitHub's servers can't reach it. Your Ops VM can.
  # ─────────────────────────────────────────────
  sonarqube:
    name: SonarQube Code Quality Scan
    runs-on: self-hosted
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Run SonarQube via Maven plugin
      # This connects to your private SonarQube server on the Ops VM
      - name: SonarQube Analysis
        working-directory: ./backend
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=devops-project2-backend \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
        # SONAR_HOST_URL will be something like http://10.0.2.5:9000
        # (the private IP of the Ops VM — Person 2 will provide this)

      # Fail the pipeline if SonarQube Quality Gate is not passed
      - name: Check SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ─────────────────────────────────────────────
  # JOB 3: DEPLOY — runs on self-hosted runner
  # Only runs on merges to main
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Backend VM
    runs-on: self-hosted
    needs: [build, sonarqube]  # Both must pass first
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:

      # 1. Download the JAR that Job 1 built
      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./target

      # 2. Get repo (for Ansible playbooks)
      - name: Checkout Code
        uses: actions/checkout@v4

      # 3. Use Ansible to copy JAR to Backend VM and restart the service
      - name: Deploy via Ansible
        run: |
          ansible-playbook ansible/deploy-backend.yml \
            -i ansible/inventory.ini \
            --extra-vars "artifact_path=./target"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"

      # 4. Hit the Spring Boot health endpoint to confirm it's running
      - name: Health Check
        run: |
          sleep 15   # Give Spring Boot time to start
          curl -f http://${{ secrets.BACKEND_VM_IP }}:8080/actuator/health | grep '"status":"UP"'
          echo "Backend is UP and connected to Azure SQL!"


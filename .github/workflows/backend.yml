name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'config/ansible/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'config/ansible/**'
      - '.github/workflows/backend.yml'

jobs:

  build:
    name: Build Spring Boot App
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven (Tests)
        working-directory: ./backend
        run: |
          export JAVA_HOME=$JAVA_HOME_21_X64
          export PATH=$JAVA_HOME/bin:$PATH
          mvn clean package -DskipTests=false
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  sonarqube:
    name: SonarQube Code Quality Scan
    runs-on: [self-hosted, linux, ops]
    needs: build
    if: (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') && vars.ENABLE_SONAR == 'true'

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build for SonarQube
        working-directory: ./backend
        run: |
          export JAVA_HOME=$JAVA_HOME_21_X64
          export PATH=$JAVA_HOME/bin:$PATH
          mvn clean compile -DskipTests=true
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: SonarQube Analysis
        working-directory: ./backend
        run: |
          export JAVA_HOME=$JAVA_HOME_21_X64
          export PATH=$JAVA_HOME/bin:$PATH
          mvn sonar:sonar \
            -Dsonar.projectKey=devops-project2-backend \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

  deploy:
    name: Deploy to Backend VM
    runs-on: [self-hosted, linux, ops]
    needs: [build, sonarqube]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_PRIVATE_DEPLOY == 'true'

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: ./config/ansible/target

      - name: Deploy via Ansible
        working-directory: ./config/ansible
        run: |
          ansible-playbook playbooks/deploy-backend.yml \
            -i inventories/dev/hosts.yml \
            --extra-vars "artifact_path=$(pwd)/target"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
          AZURE_SQL_HOSTNAME: sql-bb-dev-team5.database.windows.net
          AZURE_SQL_DBNAME: burgerbuilderdb
          AZURE_SQL_USER: ${{ secrets.AZURE_SQL_USER }}
          AZURE_SQL_PASSWORD: ${{ secrets.AZURE_SQL_PASSWORD }}

      - name: Health Check
        run: |
          sleep 15
          curl -k -f https://20.230.242.199/api/health | grep '"status":"UP"'


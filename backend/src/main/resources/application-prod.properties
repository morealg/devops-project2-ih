# Server
server.port=8080
server.tomcat.connection-timeout=20000

# Database (Azure SQL) — values injected from GitHub Secrets as env vars
spring.datasource.url=jdbc:sqlserver://${AZURE_SQL_HOSTNAME}:1433;databaseName=${AZURE_SQL_DBNAME};encrypt=true;trustServerCertificate=false;hostNameInCertificate=*.database.windows.net;loginTimeout=30
spring.datasource.username=${AZURE_SQL_USER}
spring.datasource.password=${AZURE_SQL_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Connection pool
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA — validate only, never auto-create tables in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# SQL init — disable in prod, schema already exists
spring.sql.init.mode=never

# CORS — only allow the Application Gateway (filled in after Person 1 provides it)
allowed.origins=${APP_GATEWAY_FQDN}
app.cors.allowed-origins=${APP_GATEWAY_FQDN}

# Actuator — for Application Gateway health probe
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Logging — less verbose in production
logging.level.root=WARN
logging.level.com.burgerbuilder=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

- name: Install Docker dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create Docker apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add Docker apt repository key
  ansible.builtin.shell: >
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg |
    gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Add Docker apt repository
  ansible.builtin.shell: >
    echo
    "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg]
    https://download.docker.com/linux/ubuntu
    $(. /etc/os-release && echo $VERSION_CODENAME) stable" |
    tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Install Docker engine and compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create SonarQube root directory
  ansible.builtin.file:
    path: "{{ sonarqube_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render SonarQube Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ sonarqube_root }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Start SonarQube stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ sonarqube_root }}"
